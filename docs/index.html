<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro â€” Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04050f;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
#root{width:100%;max-width:900px}
.liquid-glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);border-radius:16px}
input,textarea,select,button{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:rgba(96,165,250,0.3)}
button{cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
// framer-motion polyfill
const motion = new Proxy({}, { get: (_, p) => {
  const tag = p === 'button' || p === 'span' || p === 'a' ? p : 'div';
  return ({ children, initial, animate, exit, whileHover, transition, layout, variants, ...props }) =>
    React.createElement(tag, props, children);
}});
const AnimatePresence = ({ children }) => children;

const exercises = [
  { name: 'Push-ups', sets: 3, reps: 15, cal: 8, icon: 'ðŸ’ª', target: 'Chest & Triceps' },
  { name: 'Squats', sets: 4, reps: 20, cal: 12, icon: 'ðŸ¦µ', target: 'Legs & Glutes' },
  { name: 'Plank', sets: 3, reps: 60, cal: 5, icon: 'ðŸ§˜', target: 'Core', isTime: true },
  { name: 'Burpees', sets: 3, reps: 10, cal: 15, icon: 'ðŸƒ', target: 'Full Body' },
  { name: 'Pull-ups', sets: 3, reps: 8, cal: 10, icon: 'ðŸ‹ï¸', target: 'Back & Biceps' },
];

function TrackerDemo() {
  const [done, setDone] = useState<Record<string, number>>({});
  const [water, setWater] = useState(0);

  function toggle(name: string, sets: number) {
    setDone((prev) => {
      const cur = prev[name] || 0;
      if (cur >= sets) { const { [name]: _, ...rest } = prev; return rest; }
      return { ...prev, [name]: cur + 1 };
    });
  }

  const totalCal = Object.entries(done).reduce((sum, [name, count]) => {
    const ex = exercises.find((e) => e.name === name);
    return sum + (ex ? ex.cal * count : 0);
  }, 0);

  const totalDone = Object.values(done).reduce((a, b) => a + b, 0);
  const totalPossible = exercises.reduce((a, e) => a + e.sets, 0);
  const progress = totalPossible > 0 ? (totalDone / totalPossible) * 100 : 0;

  return (
    <div className="liquid-glass rounded-2xl p-6 space-y-5">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-7 h-7 rounded-lg bg-[#34d399]/15 flex items-center justify-center text-sm">ðŸ’ª</div>
          <div>
            <h3 className="text-sm font-semibold">FitTrack Pro</h3>
            <div className="text-[10px] text-[var(--color-text-muted)]">Today's workout Â· {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}</div>
          </div>
        </div>
        <span className="text-[10px] px-2 py-0.5 rounded-md bg-white/[0.03] text-[var(--color-text-muted)] font-mono">{totalDone}/{totalPossible} sets</span>
      </div>

      <div className="grid grid-cols-3 gap-3">
        {[
          { label: 'Progress', value: `${Math.round(progress)}%`, color: '#60a5fa', icon: 'ðŸ“Š' },
          { label: 'Calories', value: totalCal, color: '#f472b6', icon: 'ðŸ”¥' },
          { label: 'Water', value: `${water}/8`, color: '#38bdf8', icon: 'ðŸ’§' },
        ].map((stat) => (
          <div key={stat.label} className="bg-white/[0.02] rounded-xl p-3 text-center border border-white/[0.04]">
            <div className="text-lg mb-0.5">{stat.icon}</div>
            <div className="text-lg font-bold" style={{ color: stat.color }}>{stat.value}</div>
            <div className="text-[10px] text-[var(--color-text-muted)]">{stat.label}</div>
          </div>
        ))}
      </div>

      <div className="space-y-2.5">
        {exercises.map((ex) => {
          const d = done[ex.name] || 0;
          const pct = (d / ex.sets) * 100;
          return (
            <div key={ex.name} className="flex items-center gap-3 p-3 bg-white/[0.02] rounded-xl border border-white/[0.04]">
              <span className="text-xl">{ex.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="flex items-center justify-between mb-1">
                  <span className="text-[13px] font-medium">{ex.name}</span>
                  <span className="text-[10px] text-[var(--color-text-muted)]">{ex.sets}Ã--{ex.reps}{ex.isTime ? 's' : ''}</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="flex-1 h-1.5 bg-white/[0.04] rounded-full overflow-hidden">
                    <div className="h-full rounded-full bg-gradient-to-r from-[#60a5fa] to-[#34d399] transition-all duration-500" style={{ width: `${pct}%` }} />
                  </div>
                  <span className="text-[10px] text-[var(--color-text-muted)] w-8 text-right">{d}/{ex.sets}</span>
                </div>
                <p className="text-[10px] text-[var(--color-text-muted)] mt-1">{ex.target} Â· {ex.cal * d} cal</p>
              </div>
              <div className="flex gap-1">
                {Array.from({ length: ex.sets }).map((_, i) => (
                  <button key={i} onClick={() => toggle(ex.name, ex.sets)}
                    className={`w-7 h-7 rounded-lg text-[10px] font-bold transition-all duration-200 cursor-pointer border ${
                      i < d ? 'bg-[#4f8fde] border-[#60a5fa]/30 text-white shadow-[0_2px_8px_rgba(96,165,250,0.15)]' : 'bg-white/[0.02] border-white/[0.05] text-[var(--color-text-muted)] hover:border-white/[0.1]'
                    }`}>
                    {i + 1}
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <div className="bg-white/[0.02] rounded-xl p-4 border border-white/[0.04]">
        <div className="flex items-center justify-between mb-2">
          <span className="text-[11px] font-medium text-[var(--color-text-secondary)]">Water Intake</span>
          <span className="text-[11px] font-mono text-[var(--color-text-muted)]">{water} / 8 cups</span>
        </div>
        <div className="flex gap-1.5">
          {Array.from({ length: 8 }).map((_, i) => (
            <button key={i} onClick={() => setWater(i < water ? i : i + 1)}
              className={`flex-1 h-7 rounded-lg transition-all duration-200 cursor-pointer border ${i < water ? 'bg-[#38bdf8]/20 border-[#38bdf8]/30' : 'bg-white/[0.02] border-white/[0.04]'}`}>
              <span className={`text-[10px] ${i < water ? 'text-[#38bdf8]' : 'text-transparent'}`}>ðŸ’§</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TrackerDemo));
</script>
</body>
</html>
